name: Push to main
on:
  push:
    branches: [ main ]
jobs:
  Build_and_Push:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Build without tests
        run: mvn clean package -DskipTests
      - name: Authenticate to GCP
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-central2-docker.pkg.dev
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/main-patryk/petclinic:latest
            europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/main-patryk/petclinic:${{ github.sha }}
