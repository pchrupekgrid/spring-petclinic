name: Java CI with Gradle (MR)

on:
  pull_request:
    branches: [ main ]

jobs:
  Checkstyle:
    runs-on: ubuntu-latest
    container: maven:3.8.5-openjdk-17
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain
      - name: Upload Checkstyle Report
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/main.xml

  Test:
    needs: Checkstyle
    runs-on: ubuntu-latest
    container: maven:3.8.5-openjdk-17
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: ./gradlew test

  Build:
    needs: Test
    runs-on: ubuntu-latest
    container: maven:3.8.5-openjdk-17
    steps:
      - uses: actions/checkout@v4
      - name: Build Jar
        run: ./gradlew assemble
      
      - name: Rename to app.jar
        run: find build/libs -name "*.jar" ! -name "*-plain.jar" -exec mv {} build/libs/app.jar \;
        
      - name: Upload Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: build/libs/app.jar

  Docker_push:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Pobieramy plik app.jar prosto do głównego folderu obok Dockerfile'a
      - name: Download Jar Artifact
        uses: actions/download-artifact@v4
        with:
          name: petclinic-jar
          path: .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mr:${{ github.sha }}